# Production Configuration

# Server Configuration — Render/Railway inject PORT env var
server.port=${PORT:8080}
server.servlet.context-path=/

# Database Configuration - MySQL
spring.datasource.url=jdbc:mysql://mysql-e885cb-amitrai8736869660-8e87.c.aivencloud.com:13203/defaultdb?ssl-mode=REQUIRED
spring.datasource.username=${DB_USERNAME:avnadmin}
spring.datasource.password=${DB_PASSWORD:AVNS_QmTKkaZVEE9iqIZFVKe}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.generate_statistics=false

# Disable H2 Console
spring.h2.console.enabled=false

# JWT Configuration
app.jwtSecret=${JWT_SECRET}
app.jwtExpirationMs=${JWT_EXPIRATION:86400000}

# Frontend URLs
app.frontend.reset-password-url=${APP_FRONTEND_RESET_PASSWORD_URL:https://app.example.com/reset-password}
app.frontend.verify-email-url=${APP_FRONTEND_VERIFY_EMAIL_URL:https://app.example.com/verify-email}

# Mail (via env vars — no hardcoded credentials)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=${MAIL_FROM:FinTrackrTech@gmail.com}

# IMPORTANT: leave test-recipient empty for real user delivery
app.mail.test-recipient=
# Disable mail debug in production
spring.mail.properties.mail.debug=false
logging.level.org.springframework.mail=WARN

# Cloudinary (via env vars)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Encryption
app.encryption.secret-key=${APP_ENCRYPTION_SECRET_KEY}

# Multipart / File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Recommendation Service
app.recommendation.base-url=${APP_RECOMMENDATION_BASE_URL:http://localhost:8081}
app.recommendation.api-key=${APP_RECOMMENDATION_API_KEY:}

# Logging Configuration
logging.level.com.finance=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Security Configuration
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.timeout=30m

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.serialization.fail-on-empty-beans=false

# Validation Configuration
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# Actuator Configuration (for monitoring / health checks)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Currency API
currency.api.url=${CURRENCY_API_URL:https://open.er-api.com/v6/latest/INR}
currency.fetch-rate-ms=${CURRENCY_FETCH_RATE_MS:60000}
